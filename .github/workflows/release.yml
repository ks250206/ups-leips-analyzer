name: Release binaries

on:
  workflow_dispatch:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  macos:
    name: Build macOS ${{ matrix.arch }} app
    runs-on: macos-15
    strategy:
      fail-fast: false
      matrix:
        arch: [arm64, amd64]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.1.1
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.x"
      - run: pnpm install --frozen-lockfile
      - run: pnpm binary:build:macos-app:${{ matrix.arch }}
      - uses: softprops/action-gh-release@v2
        if: github.event_name == 'release'
        with:
          files: bin/UPS-LEIPS-Analyzer-darwin-${{ matrix.arch }}.app.zip
      - uses: actions/upload-artifact@v4
        if: github.event_name == 'workflow_dispatch'
        with:
          name: UPS-LEIPS-Analyzer-darwin-${{ matrix.arch }}.app
          path: bin/UPS-LEIPS-Analyzer-darwin-${{ matrix.arch }}.app.zip

  windows:
    name: Build Windows amd64 exe
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.1.1
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.x"
      - run: pnpm install --frozen-lockfile
      - run: pnpm binary:build:windows-x64
      - uses: softprops/action-gh-release@v2
        if: github.event_name == 'release'
        with:
          files: bin/ups-leips-analyzer-windows-amd64.exe
      - uses: actions/upload-artifact@v4
        if: github.event_name == 'workflow_dispatch'
        with:
          name: ups-leips-analyzer-windows-amd64
          path: bin/ups-leips-analyzer-windows-amd64.exe
